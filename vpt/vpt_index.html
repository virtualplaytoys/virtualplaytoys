<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>~*~ Prism Collective ~*~ Avatar Directory ~*~</title>
<style>
  :root{
    --bg:#0f0f0f;
    --panel:#181818;
    --panel-2:#212121;
    --border:#303030;
    --text:#f1f1f1;
    --text-dim:#aaaaaa;
    --text-faint:#717171;
    --accent:#3ea6ff;
    --link:#3ea6ff;
    --font: Arial, Helvetica, sans-serif;
  }

  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--font);
    font-size:14px;
  }

  a{color:var(--link);text-decoration:none;}

  .box{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:8px;
  }

  /* ---------- Header ---------- */
  .header-wrap{ padding:20px 4vw 10px; }
  header.box{
    max-width:900px;
    margin:0 auto;
    padding:22px 24px;
  }
  h1{
    font-size:1.6rem;
    margin:0 0 8px;
    color:var(--text);
    font-weight:bold;
  }
  header p.lede{
    max-width:65ch;
    margin:0;
    color:var(--text-dim);
    font-size:0.92rem;
    line-height:1.55;
  }

  /* ---------- Photo scroller ---------- */
  .marquee-shell.box{
    position:relative;
    height:180px;
    overflow:hidden;
    margin:16px 4vw;
  }
  .marquee-track{
    position:absolute;
    top:0; left:0;
    height:100%;
    width:100%;
  }
  .marquee-track a{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    display:block;
    cursor:pointer;
  }
  .marquee-track img{
    display:block;
    height:150px;
    width:auto;
    border-radius:6px;
    border:1px solid var(--border);
    transition:border-color .15s ease;
  }
  .marquee-track a:hover img{
    border-color:var(--text-faint);
  }

  /* ---------- Controls ---------- */
  .controls{
    margin:20px 4vw 0;
    padding:14px 16px;
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    align-items:center;
  }
  .search{
    flex:1 1 240px;
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:20px;
    padding:8px 14px;
  }
  .search input{
    flex:1;
    background:none;
    border:none;
    outline:none;
    color:var(--text);
    font-family:var(--font);
    font-size:0.9rem;
  }
  .search input::placeholder{color:var(--text-faint);}

  .result-count{
    margin:12px 4vw 0;
    font-size:0.8rem;
    color:var(--text-faint);
  }

  /* ---------- Grid ---------- */
  .grid{
    padding:14px 4vw 60px;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));
    gap:18px;
  }

  .card{
    padding:0;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  .card:hover{ border-color:var(--text-faint); }

  .card-media{
    position:relative;
    aspect-ratio:4/3;
    overflow:hidden;
    border-bottom:1px solid var(--border);
    background:var(--panel-2);
  }
  .card-media img{ width:100%; height:100%; object-fit:cover; }
  .status-dot{
    position:absolute;
    top:8px; right:8px;
    display:flex; align-items:center; gap:5px;
    font-size:0.65rem;
    background:rgba(0,0,0,0.75);
    padding:3px 8px;
    border-radius:12px;
    color:var(--text-dim);
  }
  .status-dot::before{
    content:'';
    width:6px;height:6px;border-radius:50%;
    background:#3ea63e;
    display:inline-block;
  }
  .status-dot.away::before{ background:#e14545; }

  .card-body{ padding:14px 14px 16px; display:flex; flex-direction:column; gap:6px; flex:1; }
  .card-name{
    font-size:1.05rem;
    margin:0;
    color:var(--text);
    font-weight:bold;
  }
  .card-role{
    font-size:0.72rem;
    letter-spacing:0.02em;
    color:var(--text-faint);
    text-transform:uppercase;
  }
  .card-bio{ font-size:0.85rem; line-height:1.5; color:var(--text-dim); margin:0; flex:1; }
  .card-tags{ display:flex; flex-wrap:wrap; gap:6px; margin-top:2px; }
  .chip{
    font-size:0.68rem;
    padding:2px 9px;
    border-radius:12px;
    border:1px solid var(--border);
    color:var(--text-dim);
    background:var(--panel-2);
  }
  .card-cta{
    margin-top:8px;
    font-size:0.82rem;
    color:var(--accent);
    text-align:center;
    padding:7px;
    border-radius:16px;
    border:1px solid var(--border);
    background:var(--panel-2);
  }
  .card-cta:hover{ background:var(--border); }

  .empty-state{
    grid-column:1/-1;
    text-align:center;
    padding:50px 20px;
    color:var(--text-faint);
  }

  /* ---------- Footer ---------- */
  footer{
    text-align:center;
    padding:20px;
    font-size:0.75rem;
    color:var(--text-faint);
    border-top:1px solid var(--border);
  }
  .visitor-badge{
    display:inline-block;
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:6px;
    padding:5px 12px;
    color:var(--text-dim);
    font-family:'Courier New',monospace;
    margin-top:8px;
  }

  @media (prefers-reduced-motion: reduce){
    .marquee-track img{ transition:none; }
  }
</style>
</head>
<body>

<div class="header-wrap">
  <header class="box">
    <h1><span class="sparkle">✦</span> Prism Collective <span class="sparkle">✦</span></h1>
    <p class="lede">A directory of virtual avatar artisans. Search by name or filter by tag to find the right creator for your next avatar.</p>
    <div class="divider-gems">◆ ◇ ◆ ◇ ◆</div>
  </header>
</div>

<div class="marquee-shell box" id="marqueeShell">
  <div class="marquee-track" id="marqueeTrack"></div>
</div>

<div class="controls box">
  <div class="search">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="Search by name..." />
  </div>
</div>

<div class="result-count" id="resultCount"></div>

<main class="grid" id="grid"></main>

<footer>
  <p>© Prism Collective — a fan-made template, not a real site</p>
  <div class="visitor-badge">VISITORS: 004,281</div>
</footer>

<script>
  // =====================================================================
  // MEMBER DATA
  // -----------------------------------------------------------------
  // This is the ONLY part of the file you need to touch to add, remove,
  // or edit a member. Everything below (marquee, filters, search, grid)
  // rebuilds itself automatically from this list.
  //
  // TO ADD A NEW MEMBER:
  //   1. Copy one whole { ... } block below (including the commas).
  //   2. Paste it right before the closing "];" line.
  //   3. Change the id to a number nobody else is using.
  //   4. Edit name / role / tags / bio / status to the real info.
  //   5. Save the file and reload it in your browser. Done.
  //
  // FIELD GUIDE:
  //   id     -> any unique number, just don't reuse one
  //   name   -> display name shown on the card
  //   role   -> short label under the name (e.g. "Character Artist")
  //   tags   -> array of lowercase words used for the filter buttons.
  //             Reuse existing tags where you can so the filters
  //             don't get too cluttered, but new tags work fine too.
  //   bio    -> 1-2 sentence description
  //   status -> "available" or "unavailable" (controls the red/green badge)
  //   link   -> where clicking their card or scrolling image should go.
  //             Point this at that member's own profile page (e.g.
  //             "members/vesper.html"). Leave as "#" as a placeholder
  //             if you haven't built that page yet.
  // =====================================================================
  const MEMBERS = [
    // ---- COPY FROM HERE ----
    { id:1, name:"Vesper Kaida", role:"Character Artist", tags:["cyberpunk","original"], bio:"Builds neon-lit street-style avatars with a focus on modular armor pieces and animated visor UI.", status:"available", link:"#" },
    // ---- TO HERE, PASTE BELOW, THEN EDIT ----

    { id:2, name:"Rin Solace", role:"Rigger & Animator", tags:["fantasy","creature"], bio:"Specializes in expressive custom face rigs for creature and hybrid-form avatars.", status:"available", link:"#" },
    { id:3, name:"Onyx Marrow", role:"3D Sculptor", tags:["gothic","original"], bio:"Dark academia-inspired designs with hand-sculpted fabric physics and candlelit textures.", status:"unavailable", link:"#" },
    { id:4, name:"Fable Ashgrove", role:"Texture Artist", tags:["cottagecore","nature"], bio:"Painterly hand-drawn textures for woodland and botanical-themed avatars.", status:"available", link:"#" },
    { id:5, name:"Juno Vellichor", role:"Concept Designer", tags:["mecha","scifi"], bio:"Hard-surface mecha shells with functioning panel lights and thruster VFX.", status:"unavailable", link:"#" },
    { id:6, name:"Wren Isolde", role:"Character Artist", tags:["kemono","fantasy"], bio:"Soft-shaded kemono avatars with custom tail and ear physics setups.", status:"available", link:"#" },
    { id:7, name:"Halcyon Vane", role:"World & Prop Artist", tags:["scifi","original"], bio:"Builds companion props and interactive gadgets that pair with any avatar base.", status:"available", link:"#" },
    { id:8, name:"Marlow Petra", role:"Sculptor", tags:["gothic","creature"], bio:"Baroque-inspired horned and winged forms with intricate metal filigree.", status:"unavailable", link:"#" }

    // ---- ADD NEW MEMBERS ABOVE THIS LINE ----
  ];

  // ---------------------------------------------------------
  // Marquee: build a duplicated placeholder strip and scroll it
  // ---------------------------------------------------------
  const track = document.getElementById('marqueeTrack');
  const placeholderColors = ['a970ff','ff4fd8','4fe8ff','ffd24f','7a5cff','ff9f4f'];

  function placeholderImg(seed, label){
    const color = placeholderColors[seed % placeholderColors.length];
    return `https://placehold.co/220x220/${color}/0a0512?text=${encodeURIComponent(label)}`;
  }

  function makeItem(memberIndex){
    const m = MEMBERS[memberIndex];
    const a = document.createElement('a');
    a.href = m.link || '#';
    a.setAttribute('aria-label', `View ${m.name}'s profile`);
    a.style.position = 'absolute';
    a.style.top = '50%';
    a.style.transform = 'translateY(-50%)';

    const img = document.createElement('img');
    img.src = placeholderImg(memberIndex, m.name.split(' ')[0]);
    img.alt = m.name;

    a.appendChild(img);
    return a;
  }

  const GAP = 32;
  const SPEED = 55; // px per second — adjust to taste
  let paused = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  let lastTime = null;
  let widthsByMember = []; // cached rendered width per member, filled once at startup
  let active = []; // { el, x, w, memberIndex }
  let reservoir = []; // queue of member indices waiting to be spawned

  function shuffledIndices(){
    const arr = MEMBERS.map((_, i) => i);
    for(let i = arr.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function drawFromReservoir(){
    if(reservoir.length === 0) reservoir = shuffledIndices();
    return reservoir.shift();
  }

  function returnToReservoir(memberIndex){
    reservoir.push(memberIndex);
  }

  function waitForImages(images){
    return Promise.all([...images].map(img => {
      if(img.complete) return Promise.resolve();
      return new Promise(resolve => { img.onload = resolve; img.onerror = resolve; });
    }));
  }

  // Preload every member's image once, off-screen, purely to measure
  // its rendered width. After this, spawning a new image never has to
  // wait on image-load — we already know how wide it'll be.
  async function preloadWidths(){
    const probe = document.createElement('div');
    probe.style.cssText = 'position:absolute; visibility:hidden; top:-9999px; left:-9999px; display:flex;';
    document.body.appendChild(probe);

    const imgs = MEMBERS.map((m, i) => {
      const img = document.createElement('img');
      img.src = placeholderImg(i, m.name.split(' ')[0]);
      img.style.cssText = 'height:150px; width:auto;';
      probe.appendChild(img);
      return img;
    });

    await waitForImages(imgs);
    widthsByMember = imgs.map(img => img.getBoundingClientRect().width);
    probe.remove();
  }

  function spawnNext(startX){
    const memberIndex = drawFromReservoir();
    const el = makeItem(memberIndex);
    const w = widthsByMember[memberIndex];
    el.style.left = `${startX}px`;
    track.appendChild(el);
    active.push({ el, x: startX, w, memberIndex });
  }

  // Fill the visible width up-front so the row doesn't start empty
  // and only "drip" in new images from then on.
  function primeInitialRow(){
    const shellWidth = document.getElementById('marqueeShell').clientWidth;
    let x = shellWidth;
    while(x > -200){
      spawnNext(x);
      const last = active[active.length - 1];
      x -= (last.w + GAP);
    }
  }

  function tick(timestamp){
    if(lastTime === null) lastTime = timestamp;
    const dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;

    if(!paused){
      const distance = SPEED * dt;
      const shellWidth = document.getElementById('marqueeShell').clientWidth;

      active.forEach(item => {
        item.x -= distance;
        item.el.style.left = `${item.x}px`;
      });

      // Drip a new image in from the reservoir once there's enough
      // room after the current rightmost image — this is the only
      // thing that ever positions a new item, so nothing that's
      // already moving gets touched or reset.
      const rightmost = active.length
        ? Math.max(...active.map(item => item.x + item.w))
        : -Infinity;
      if(rightmost + GAP <= shellWidth){
        spawnNext(Math.max(shellWidth, rightmost + GAP));
      }

      // Once an image has fully scrolled off the left edge, remove
      // it from the DOM and drop its member back into the reservoir
      // so it can be drawn again later.
      active = active.filter(item => {
        if(item.x + item.w < 0){
          item.el.remove();
          returnToReservoir(item.memberIndex);
          return false;
        }
        return true;
      });
    }

    requestAnimationFrame(tick);
  }

  (async () => {
    await preloadWidths();
    reservoir = shuffledIndices();
    primeInitialRow();
    requestAnimationFrame(tick);
  })();

  // Pause on hover so the images are actually click-able as links —
  // they'd be a moving target otherwise.
  document.getElementById('marqueeShell').addEventListener('mouseenter', () => paused = true);
  document.getElementById('marqueeShell').addEventListener('mouseleave', () => paused = false);


  document.getElementById('marqueeShell').addEventListener('mouseenter', () => track.classList.add('paused'));
  document.getElementById('marqueeShell').addEventListener('mouseleave', () => track.classList.remove('paused'));

  // ---------------------------------------------------------
  // Search + render
  // ---------------------------------------------------------
  const searchInput = document.getElementById('searchInput');
  const grid = document.getElementById('grid');
  const resultCount = document.getElementById('resultCount');

  searchInput.addEventListener('input', render);

  function cardTemplate(m, idx){
    const img = placeholderImg(idx, m.name.split(' ')[0]);
    return `
      <a class="card box" href="${m.link || '#'}">
        <div class="card-media">
          <img src="${img}" alt="${m.name} placeholder" loading="lazy" />
          <span class="status-dot ${m.status === 'unavailable' ? 'away' : ''}">${m.status === 'unavailable' ? 'Not Available' : 'Available'}</span>
        </div>
        <div class="card-body">
          <p class="card-role">${m.role}</p>
          <h3 class="card-name">${m.name}</h3>
          <p class="card-bio">${m.bio}</p>
          <div class="card-tags">
            ${m.tags.map(t => `<span class="chip">${t}</span>`).join('')}
          </div>
          <div class="card-cta">View profile &raquo;</div>
        </div>
      </a>`;
  }

  function render(){
    const q = searchInput.value.trim().toLowerCase();
    const filtered = MEMBERS.filter(m => !q || m.name.toLowerCase().includes(q));

    resultCount.textContent = `${filtered.length} member${filtered.length === 1 ? '' : 's'} found`;

    if(filtered.length === 0){
      grid.innerHTML = `<div class="empty-state">No members match that search. Try a different name or tag.</div>`;
      return;
    }

    grid.innerHTML = filtered.map(m => cardTemplate(m, MEMBERS.indexOf(m))).join('');
  }

  render();
</script>
</body>
</html>
